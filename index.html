<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Gestor de recompensas</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 2rem; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #ccc; padding: 0.5rem; text-align: left; }
    button { margin-right: 0.5rem; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React y ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <!-- Babel para interpretar JSX en el navegador -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const initialMembers = [
      { id: 1, name: 'Ana', points: 120 },
      { id: 2, name: 'Luis', points: 80 },
      { id: 3, name: 'Carla', points: 60 },
    ];

    function App() {
      const [members, setMembers] = React.useState(initialMembers);

      const addPoints = (id, amount) => {
        setMembers(members.map(m =>
          m.id === id ? { ...m, points: m.points + amount } : m
        ));
      };

      const redeemPoints = (id, amount) => {
        setMembers(members.map(m =>
          m.id === id && m.points >= amount
            ? { ...m, points: m.points - amount }
            : m
        ));
      };

      return (
        <div>
          <h1>Administrador de Recompensas</h1>
          <table>
            <thead>
              <tr>
                <th>Integrante</th>
                <th>Puntos</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody>
              {members.map(m => (
                <tr key={m.id}>
                  <td>{m.name}</td>
                  <td>{m.points}</td>
                  <td>
                    <button onClick={() => addPoints(m.id, 10)}>
                      Agregar 10
                    </button>
                    <button
                      onClick={() => redeemPoints(m.id, 10)}
                      disabled={m.points < 10}
                    >
                      Redimir 10
                    </button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
