<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Gestor de recompensas</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css" rel="stylesheet"/>
  <style>
    body { padding: 2rem; }
    input[type="number"] { width: 6rem; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React y ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <!-- Babel para interpretar JSX en el navegador -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- jsPDF para exportar el informe -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <!-- XLSX para generar archivos de Excel -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <!-- Materialize JS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>

  <script type="text/babel">
    const initialMembers = [
      { id: 1, name: 'Ana', email: 'ana@example.com', points: 120 },
      { id: 2, name: 'Luis', email: 'luis@example.com', points: 80 },
      { id: 3, name: 'Carla', email: 'carla@example.com', points: 60 },
    ];

    function App() {
      const [members, setMembers] = React.useState(initialMembers);
      const [name, setName] = React.useState('');
      const [email, setEmail] = React.useState('');
      const [editId, setEditId] = React.useState(null);
      const [customAmounts, setCustomAmounts] = React.useState({});
      const [redeemAmounts, setRedeemAmounts] = React.useState({});

      const resetForm = () => {
        setName('');
        setEmail('');
        setEditId(null);
      };

      const handleAddOrUpdate = () => {
        if (!name.trim() || !email.trim()) return;
        if (editId) {
          setMembers(members.map(m => m.id === editId ? { ...m, name, email } : m));
        } else {
          const newMember = { id: Date.now(), name, email, points: 0 };
          setMembers([...members, newMember]);
        }
        resetForm();
      };

      const handleEdit = (member) => {
        setEditId(member.id);
        setName(member.name);
        setEmail(member.email);
      };

      const handleDelete = (id) => {
        setMembers(members.filter(m => m.id !== id));
      };

      const addPoints100 = (id) => {
        setMembers(members.map(m => m.id === id ? { ...m, points: m.points + 100 } : m));
      };

      const addCustomPoints = (id) => {
        const value = parseInt(customAmounts[id], 10);
        if (value >= 1 && value <= 9999) {
          setMembers(members.map(m => m.id === id ? { ...m, points: m.points + value } : m));
        }
        setCustomAmounts({ ...customAmounts, [id]: '' });
      };

      const redeemPoints = (id) => {
        const value = parseInt(redeemAmounts[id], 10);
        const member = members.find(m => m.id === id);
        if (value >= 1 && value <= member.points) {
          setMembers(members.map(m => m.id === id ? { ...m, points: m.points - value } : m));
        }
        setRedeemAmounts({ ...redeemAmounts, [id]: '' });
      };

      const updateCustom = (id, val) => {
        setCustomAmounts({ ...customAmounts, [id]: val });
      };

      const updateRedeem = (id, val) => {
        setRedeemAmounts({ ...redeemAmounts, [id]: val });
      };

      const exportPdf = () => {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text('Informe de puntos', 10, 10);
        members.forEach((m, idx) => {
          doc.text(`${m.name} (${m.email}) - ${m.points}`, 10, 20 + idx * 10);
        });
        doc.save('informe_puntos.pdf');
      };

      const exportXls = () => {
        const data = members.map(m => ({ Nombre: m.name, Correo: m.email, Puntos: m.points }));
        const worksheet = XLSX.utils.json_to_sheet(data);
        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, 'Informe');
        XLSX.writeFile(workbook, 'informe_puntos.xlsx');
      };

        return (
          <div className="container">
            <h1 className="center-align">Administrador de Recompensas</h1>

            <div className="row">
              <div className="input-field col s4">
                <input id="name" type="text" className="validate" value={name} onChange={e => setName(e.target.value)} />
                <label htmlFor="name">Nombre</label>
              </div>
              <div className="input-field col s4">
                <input id="email" type="email" className="validate" value={email} onChange={e => setEmail(e.target.value)} />
                <label htmlFor="email">Correo</label>
              </div>
              <div className="col s4" style={{marginTop: '1rem'}}>
                <button className="btn waves-effect waves-light" onClick={handleAddOrUpdate}>
                  {editId ? 'Actualizar' : 'Agregar'}
                </button>
                {editId && (
                  <button className="btn grey lighten-1" style={{marginLeft: '0.5rem'}} onClick={resetForm}>
                    Cancelar
                  </button>
                )}
              </div>
            </div>

          <table className="highlight">
            <thead>
              <tr>
                <th>Nombre</th>
                <th>Correo</th>
                <th>Puntos</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody>
              {members.map(m => (
                <tr key={m.id}>
                  <td>{m.name}</td>
                  <td>{m.email}</td>
                  <td>{m.points}</td>
                    <td>
                      <button className="btn-small" onClick={() => addPoints100(m.id)}>
                        +100
                      </button>
                      <input
                        type='number'
                        min='1'
                        max='9999'
                        value={customAmounts[m.id] || ''}
                        onChange={e => updateCustom(m.id, e.target.value)}
                      />
                      <button className="btn-small" onClick={() => addCustomPoints(m.id)}>
                        Agregar
                      </button>
                      <input
                        type='number'
                        min='1'
                        max={m.points}
                        value={redeemAmounts[m.id] || ''}
                        onChange={e => updateRedeem(m.id, e.target.value)}
                      />
                      <button className="btn-small" onClick={() => redeemPoints(m.id)}>
                        Redimir
                      </button>
                      <button className="btn-small" onClick={() => handleEdit(m)}>Editar</button>
                      <button className="btn-small red" onClick={() => handleDelete(m.id)}>Eliminar</button>
                    </td>
                  </tr>
                ))}
            </tbody>
          </table>

          <button className="btn blue" onClick={exportPdf}>Exportar informe PDF</button>
          <button className="btn green" style={{marginLeft: '0.5rem'}} onClick={exportXls}>Exportar informe XLS</button>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
    document.addEventListener("DOMContentLoaded", () => { M.AutoInit(); });
  </script>
</body>
</html>
